replicaCount: 1

namespace: order-service

persistence:
  enabled: true
  claimName: order-service-pvc
  mountPath: /data

containers:
  - name: order-service
    image: nginx:latest
    port: 80
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 256Mi
    volumeMounts:
      - name: app-storage
        mountPath: /app/data

volumes:
  - name: app-storage
    persistentVolumeClaim:
      claimName: order-service-pvc
