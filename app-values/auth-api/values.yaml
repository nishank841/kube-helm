replicaCount: 1

#namespace
namespace: auth-api

persistence:
  enabled: true
  claimName: auth-api-pvc
  mountPath: /data

containers:
  - name: auth-api
    image: nginx:latest
    port: 80
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 256Mi
    volumeMounts:
      - name: app-storage
        mountPath: /app/data

volumes:
  - name: app-storage
    persistentVolumeClaim:
      claimName: auth-api-pvc
